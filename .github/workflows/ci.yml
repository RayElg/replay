name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go (build · vet · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      # Each directory is its own module in the go.work workspace. DB-backed
      # tests skip automatically when TEST_DATABASE_URL is unset — they need the
      # pgmqtt extension, so we don't spin up a plain-Postgres service here.
      - name: build · vet · test
        run: |
          set -euo pipefail
          for mod in cmd/control-plane cmd/runner internal/replaycrypto; do
            echo "::group::$mod"
            (cd "$mod" && go build ./... && go vet ./... && go test ./...)
            echo "::endgroup::"
          done

  ui:
    name: UI (lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
