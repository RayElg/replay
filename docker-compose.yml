services:
  # ─── pgmqtt (PostgreSQL + embedded MQTT broker) ──────────────────────
  pgmqtt:
    # Built from the pgmqtt 0.4.0-rc1 GitHub release tarball.
    # Adds free-tier password auth (SCRAM-SHA-256 against pg_authid);
    # control-plane enables it via ALTER SYSTEM on startup — see
    # cmd/control-plane/mqtt_auth.go.
    image: pgmqtt:0.4.0-rc1
    build:
      context: ./pgmqtt
      args:
        PGMQTT_VERSION: 0.4.0-rc1
        PG_MAJOR: "16"
    ports:
      - "127.0.0.1:5432:5432"
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgmqtt-data:/var/lib/postgresql/data
      - ./pgmqtt/02-create-replay-db.sh:/docker-entrypoint-initdb.d/02-create-replay-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 15

  # ─── MinIO (S3-compatible object store) ──────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9091"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9091:9091"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO bucket init (one-shot) ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb local/${MINIO_BUCKET} --ignore-existing;
        mc anonymous set none local/${MINIO_BUCKET};
        exit 0;
      "

  # ─── Control Plane (Go API server) ──────────────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: cmd/control-plane/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_OBJECT_STORE: ${PUBLIC_OBJECT_STORE}
      INTERNAL_OBJECT_STORE: ${INTERNAL_OBJECT_STORE}
      LISTEN_ADDR: ${LISTEN_ADDR}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGENT_MODEL: ${AGENT_MODEL}
      REPLAY_AUTO_PR_COMMENTS: ${REPLAY_AUTO_PR_COMMENTS:-true}
      # Colon-separated absolute repo roots the agent may read from (optional).
      REPLAY_ALLOWED_REPO_PATHS: ${REPLAY_ALLOWED_REPO_PATHS:-}
      # Purpose-specific secret keys (see .env.example).
      REPLAY_ENCRYPT_KEY: ${REPLAY_ENCRYPT_KEY:-}
      REPLAY_ENCRYPT_KEY_PREVIOUS: ${REPLAY_ENCRYPT_KEY_PREVIOUS:-}
      REPLAY_WEBHOOK_TOKEN: ${REPLAY_WEBHOOK_TOKEN:-}
      REPLAY_GITHUB_WEBHOOK_SECRET: ${REPLAY_GITHUB_WEBHOOK_SECRET:-}
      REPLAY_BROKER_JWT_SECRET: ${REPLAY_BROKER_JWT_SECRET:-}
      REPLAY_EXTERNAL_URL: ${REPLAY_EXTERNAL_URL:-}
      REPLAY_AUDIT_RETENTION_DAYS: ${REPLAY_AUDIT_RETENTION_DAYS:-90}
      REPLAY_SESSION_LIFETIME_DAYS: ${REPLAY_SESSION_LIFETIME_DAYS:-30}
      REPLAY_BOOTSTRAP_USER_EMAIL: ${REPLAY_BOOTSTRAP_USER_EMAIL:-}
      REPLAY_BOOTSTRAP_USER_PASSWORD: ${REPLAY_BOOTSTRAP_USER_PASSWORD:-}
      REPLAY_BOOTSTRAP_API_KEY: ${REPLAY_BOOTSTRAP_API_KEY:-}
      REPLAY_COOKIE_SECURE: ${REPLAY_COOKIE_SECURE:-false}
      REPLAY_RUNNER_MQTT_PASSWORD: ${REPLAY_RUNNER_MQTT_PASSWORD}
      REPLAY_MQTT_TRUSTED_BROKER: ${REPLAY_MQTT_TRUSTED_BROKER:-false}
      REPLAY_PGMQTT_AUTOCONFIG: ${REPLAY_PGMQTT_AUTOCONFIG:-true}
      REPLAY_PGMQTT_LICENSE_KEY: ${REPLAY_PGMQTT_LICENSE_KEY:-}
      REPLAY_BROKER_JWT_PRIVATE_KEY: ${REPLAY_BROKER_JWT_PRIVATE_KEY:-}
    volumes:
      - /tmp:/tmp
    depends_on:
      pgmqtt:
        condition: service_healthy
    restart: unless-stopped

  # ─── Runner (Test Executor) ──────────────────────────────────────────
  runner:
    build:
      context: .
      dockerfile: cmd/runner/Dockerfile
    environment:
      RUNNER_MQTT_BROKER_URL: ${RUNNER_MQTT_BROKER_URL}
      RUNNER_MQTT_USERNAME: ${RUNNER_MQTT_USERNAME:-replay_runner}
      RUNNER_MQTT_PASSWORD: ${REPLAY_RUNNER_MQTT_PASSWORD}
      RUNNER_DATABASE_URL: ${RUNNER_DATABASE_URL}
      RUNNER_OBJECT_STORE: ${RUNNER_OBJECT_STORE}
      RUNNER_CONCURRENCY: ${RUNNER_CONCURRENCY:-2}
      # Runner needs the same encryption key(s) as control-plane to decrypt
      # env_vars values stored under the replaycrypto envelope.
      REPLAY_ENCRYPT_KEY: ${REPLAY_ENCRYPT_KEY:-}
      REPLAY_ENCRYPT_KEY_PREVIOUS: ${REPLAY_ENCRYPT_KEY_PREVIOUS:-}
    depends_on:
      pgmqtt:
        condition: service_healthy
    restart: unless-stopped

  # ─── UI (Next.js) ───────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      # Hot-reloading dev server. The deploy overlays switch this to the `prod`
      # target (next build + next start) — see deploy/docker-compose.prod.yml.
      target: dev
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      CONTROL_PLANE_URL: http://control-plane:8080
    restart: unless-stopped

volumes:
  pgmqtt-data:
  minio-data:
